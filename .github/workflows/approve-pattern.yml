name: Add approved pattern to misprompt-db.json

on:
  issues:
    types: [labeled]

jobs:
  add-pattern:
    if: github.event.label.name == 'approved'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract JSON and update misprompt-db.json
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const issue = context.payload.issue;
            const body = issue.body || '';

            const jsonMatch = body.match(/```json\s*([\s\S]*?)```/);
            if (!jsonMatch) {
              core.setFailed('No JSON block found in issue body');
              return;
            }

            let pattern;
            try {
              pattern = JSON.parse(jsonMatch[1].trim());
            } catch (e) {
              core.setFailed(`Invalid JSON in issue body: ${e.message}`);
              return;
            }

            const dbPath = 'misprompt-db.json';
            let db = { version: 1, updated_at: '', count: 0, patterns: [] };

            if (fs.existsSync(dbPath)) {
              try {
                db = JSON.parse(fs.readFileSync(dbPath, 'utf-8'));
              } catch {
                // Start fresh if corrupted
              }
            }

            if (db.patterns.some(p => p.github_issue === issue.number)) {
              core.info(`Issue #${issue.number} already exists, skipping.`);
              return;
            }

            const now = new Date().toISOString();
            const tags = Array.isArray(pattern.tags)
              ? pattern.tags.filter(t => typeof t === 'string')
              : [];

            const entry = {
              id: db.patterns.length + 1,
              github_issue: issue.number,
              title: pattern.title || issue.title || 'Untitled',
              prompt_text: (pattern.prompt_text || '').trim(),
              severity: typeof pattern.severity === 'number'
                ? Math.max(1, Math.min(10, pattern.severity))
                : 5,
              tags,
              target: pattern.target || '',
              description: pattern.description || '',
              is_regex: tags.includes('regex') || pattern.is_regex === true,
              added_at: now,
            };

            db.patterns.push(entry);
            db.count = db.patterns.length;
            db.updated_at = now;

            fs.writeFileSync(dbPath, JSON.stringify(db, null, 2) + '\n');

            const { execSync } = require('child_process');
            execSync('git config user.name "github-actions[bot]"');
            execSync('git config user.email "github-actions[bot]@users.noreply.github.com"');
            execSync(`git add ${dbPath}`);
            execSync(`git commit -m "Add pattern: ${entry.title} (#${issue.number})"`);
            execSync('git push');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `Added to \`misprompt-db.json\` as pattern #${entry.id}.`,
            });
